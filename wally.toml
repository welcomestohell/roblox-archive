[package]
name = "welcomestohell/game"
description = "Source code for the Roblox tower-obby game Welcome To Hell"
version = "1000.0.0-beta"                                                  # https://antfu.me/posts/epoch-semver
authors = ["Team Fireworks <contact@teamfireworks.org>"]
realm = "shared"
registry = "https://github.com/upliftgames/wally-index"
repository = "https://github.com/welcomestohell/game"
private = true

[place]
shared-packages = "game:GetService(\"ReplicatedStorage\"):WaitForChild(\"Packages\")"
server-packages = "game:GetService(\"ServerScriptService\"):WaitForChild(\"Packages\")"

[dependencies]
Charm = "littensy/charm@0.11.0-rc.3"
CharmSync = "littensy/charm-sync@0.4.0-rc.7"
Fluid = "ffrostfall/fluid@0.6.4"
gt = "corecii/greentea@0.4.11"
Iris = "sirmallard/iris@2.5.0"
Lyra = "paradoxum-games/lyra@0.4.0-rc.7"
Option = "lukadev-0/option@1.2.0"
Promise = "lukadev-0/typed-promise@4.0.2"
Quaternion = "sleitnick/quaternion@0.2.3"
Result = "lukadev-0/result@1.2.0"
Sift = "csqrl/sift@0.0.11"
Signal = "data-oriented-house/lemonsignal@1.10.0"
typeforge = "cameronpcampbell/typeforge@3.0.4"
