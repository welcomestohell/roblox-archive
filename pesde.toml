name = "welcomestohell/game"
version = "0.1.0"
description = "Source code for Welcome To Hell"
authors = ["Team Fireworks"]
repository = "https://github.com/welcomestohell/game"
private = true

[target]
environment = "roblox"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"

[dependencies]
CatRom = { wally = "ecurtiss/catrom", version = "^1.0.0-rc1" }
Charm = { wally = "littensy/charm", version = "^0.11.0-rc.3" }
CharmSync = { wally = "littensy/charm-sync", version = "^0.4.0-rc.7" }
CullThrottle = { repo = "welcomestohell/cull-throttle", rev = "08587e8cdda407c0979bfbcca45564c876802dd7" }
Dash = { wally = "ukendio/dash", version = "0.1.9" }
Fluid = { wally = "godmothersfire/fluid", version = "^0.6.41" }
gt = { name = "corecii/greentea", version = "^0.4.11" }
Iris = { wally = "sirmallard/iris", version = "^2.5.0" }
Liquid = { name = "teamfireworks/liquid", version = "^0.1.4" }
Log = { name = "realthx1/luaulog", version = "^0.3.0", wally = "realthx1/luaulog" }
Lyra = { wally = "paradoxum-games/lyra", version = "^0.6.0" }
Option = { name = "lukadev_0/option", version = "^1.2.0" }
Promise = { wally = "lukadev-0/typed-promise", version = "^4.0.2" }
prvd = { name = "prvdmwrong/core", version = "^0.2.0-rewrite.2" }
Quaternion = { wally = "sleitnick/quaternion", version = "^0.2.3" }
Result = { name = "lukadev_0/result", version = "^1.2.0" }
Ripple = { wally = "littensy/ripple", version = "^0.10.2" }
Sift = { wally = "csqrl/sift", version = "^0.0.11" }
Signal = { wally = "data-oriented-house/lemonsignal", version = "^1.10.0" }
typeforge = { wally = "cameronpcampbell/typeforge", version = "^3.0.4" }
UILabs = { wally = "pepeeltoro41/ui-labs", version = "^2.4.2" }

[overrides]
"Liquid>Fluid" = { wally = "godmothersfire/fluid", version = "^0.6.41" }

[patches]
"corecii/greentea" = { "0.4.11 roblox" = "patches/corecii+greentea-0.4.11+roblox.patch" }
"wally#paradoxum-games/lyra" = { "0.6.0 roblox" = "patches/wally#paradoxum-games+lyra-0.6.0+roblox.patch" }
"prvdmwrong/core" = { "0.2.0-rewrite.2 roblox" = "patches/prvdmwrong+core-0.2.0-rewrite.2+roblox.patch" }
"wally#godmothersfire/fluid" = { "0.6.41 roblox" = "patches/wally#godmothersfire+fluid-0.6.41+roblox.patch" }
